<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHARNNY'S Nail Spa Booking</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #f8e1e7, #f3d1dc);
    color: #333;
}

.container {
    max-width: 500px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    color: #d63384;
}

p {
    text-align: center;
    font-size: 14px;
}

label {
    font-weight: bold;
    margin-top: 15px;
    display: block;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background: #d63384;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #b82c6e;
}

.footer {
    text-align: center;
    margin-top: 15px;
    font-size: 13px;
}

.whatsapp {
    display: block;
    text-align: center;
    margin-top: 10px;
    color: green;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>SHARNNY'S Nail Spa 💅🏽</h1>
    <p>Mobile Nail Services in Nairobi — We Come to You</p>

    <form action="https://formsubmit.co/barakakariuki322@gmail.com" method="POST">

        <!-- Hidden settings -->
        <input type="hidden" name="_subject" value="New Nail Booking!">
        <input type="hidden" name="_captcha" value="false">

        <label>Full Name</label>
        <input type="text" name="Name" required>

        <label>Phone Number</label>
        <input type="tel" name="Phone" required>

        <label>Your Location (Estate / Area)</label>
        <input type="text" name="Location" required>

        <label>Select Service</label>
        <select name="Service" required>
            <option value="">Choose Service</option>
            <option>Gel Nails</option>
            <option>Acrylic Nails</option>
            <option>Nail Repair</option>
            <option>Full Set + Design</option>
            <option>Home Service</option>
        </select>

        <label>Preferred Date</label>
        <input type="date" name="Date" required>

        <label>Preferred Time</label>
        <input type="time" name="Time" required>

        <label>Additional Notes</label>
        <textarea name="Notes" rows="3"></textarea>

        <button type="submit">Book Appointment</button>
    </form>

    <a class="whatsapp" href="https://wa.me/254113832180?text=Hi%20I%20want%20to%20book%20a%20nail%20appointment">
        Or Book via WhatsApp
    </a>

    <div class="footer">
        Fast response within minutes 🚀
    </div>
</div>

</body>
  </html>
